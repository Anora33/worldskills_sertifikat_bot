name: Render Keep-Alive Ping

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping_render:
    runs-on: ubuntu-latest
    steps:
      - name: Send ping to Render bot
        run: |
          echo "Pinging Render bot..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" "https://worldskills-sertifikat-bot.onrender.com/health"
          echo "Ping completed at $(date)"